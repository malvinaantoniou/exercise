name: Docker Scout Scan

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write  # Απαραίτητο για το ανέβασμα του SARIF

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: quickview, cves
          image: ghcr.io/${{ github.repository }}:latest
          sarif-file: sca_scout.sarif
          output: sbom_scout.spdx.json
          format: spdx
          exit-code: false

      - name: Upload SBOM and SARIF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            sbom_scout.spdx.json
            sca_scout.sarif

      # Προαιρετικό: Ανεβάζει το SARIF στο Security Tab του GitHub (αν το repo είναι δημόσιο)
      - name: Upload SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sca_scout.sarif
          category: Docker-Scout
